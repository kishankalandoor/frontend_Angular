<div class="login">
	<div class="container-login">
	  <div class="wrap-login">
		<div class="login-form-title">
		  <span class="login-form-title-1">Change password</span>
		</div>
		<div class="ctl-text">
			<p></p>
		</div>
		<form class="login-form" [formGroup]="resetPassword" (ngSubmit)="resetEmailPassword()">

			<div>
				<div class="wrap-input">
					<span class="btn-icon-menu "> <i class="fa fa-lock ml-1"></i> </span>
					<span class="btn-show-pass" (click)="showHideOldPassword()">
						<i [hidden]="!config.oldPasswordShow" class="fa fa-eye ml-1"></i>
						<i [hidden]="config.oldPasswordShow" class="fa fa-eye-slash ml-1"></i>
					</span>
					<input class="input form-control" [type]="config.oldPasswordShow ? 'text' : 'password'"  formControlName="oldPassword" placeholder="Old Password">
				</div>

				<div *ngIf="config.isSubmitted && formControls.oldPassword.errors">
					<span class="error-message" *ngIf="formControls.oldPassword.errors.required">Old Password is a required field.</span>
				</div>

				<div class="wrap-input">
					<span class="btn-icon-menu "> <i class="fa fa-lock ml-1"></i> </span>
					<span class="btn-show-pass" (click)="showHideNewPassword()">
						<i [hidden]="!config.newPasswordShow" class="fa fa-eye ml-1"></i>
						<i [hidden]="config.newPasswordShow" class="fa fa-eye-slash ml-1"></i>
					</span>
					<input class="input form-control" [type]="config.newPasswordShow ? 'text' : 'password'"   formControlName="newPassword" placeholder="New Password">
				</div>

				<div *ngIf="config.isSubmitted && formControls.newPassword.errors">
					<span class="error-message" *ngIf="formControls.newPassword.errors.required">New Password is a required field.</span>
				</div>

				<div class="container-login-form-btn m-t-35">
					<button type="submit" class="login-form-btn text-light">Change Password</button>
				</div>
			</div>

		</form>
        <p class="ctl-back-link">
            <a  routerLink="/main/dashboard/landing-dashboard" class="text-link">Back to Dashboard <i class="fa fa-arrow-alt-circle-left ml-1"></i></a>
        </p>
	  </div>
	</div>
  </div>
