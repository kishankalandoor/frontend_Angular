
<div class="col-lg-12 pl-0 pr-0">
    <div class="card">
      <div class="card-body">
            <div class="row">
                <div class="col-10 col-md-10">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">Master</li>
                            <li class="breadcrumb-item" aria-current="page" >{{config.name}}</li>
                        </ol>
                    </nav>
                </div>
                <div class="col-2 col-md-2 d-flex justify-content-end align-items-end flex-column">
                  <button type="button" (click)="refreshPage()" class="btn btn-icons btn-rounded btn-outline-secondary mr-1" tooltip="Refresh" placement="top"><i class="fas fa-sync-alt" aria-hidden="true"></i></button>
                  <p class="mb-0">Refresh</p>
                </div>
            </div>
            <hr>

            <div class="row">
              <div class="form-group col-md-4 d-flex">
                <i class="fa fa-search my-auto" aria-hidden="true"></i>
                <input type="text" class="form-control" [(ngModel)]= 'inputText' placeholder="Search {{config.tableColumn2}}" (ngModelChange)="this.filterUpdate.next($event)">
              </div>
              <div class="col-md-4">
                <div class="form-group row" >
                  <div class="col-sm-9">
                    <select class="form-control" (change)="getFilter($event.target.value)" appBrowserCompatablity>
                      <option >All</option>
                      <option value="active">Active</option>
                      <option value="inActive">Inactive</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="col-md-4">
                 <div class="template-demo d-flex justify-content-end">
                     <button type="button" class="btn btn-icons btn-rounded btn-outline-success" tooltip="Create {{config.name}}"  placement="top" (click)="create()"><i class="fas fa-plus"></i></button>
                 </div>
             </div>

            </div>
            <div class="loading">
            <div style="overflow-x:auto;">
              <table class="table table-hover">
                <thead>
                  <tr>
                    <!-- <th><i class="far fa-user pr-3"></i>{{config.tableColumn1}}</th> -->
                    <th><i class="far fa-user pr-3"></i>{{config.tableColumn2}}</th>
                    <th><i class="fa fa-cog pr-3"></i>Action</th>
                  </tr>
                </thead>
                <tbody *ngIf="config.flag === 0">
                  <tr *ngFor="let category of page.content; let i = index" >
                    <!-- <td>{{category.category?.categoryName}}</td> -->
                    <td>{{category.categoryName}}</td>
                    <td>
                      <div *ngIf="category.active === true" class="row">
                        <div class="custom-control custom-switch" tooltip="Active"  placement="top">
                          <input type="checkbox" class="custom-control-input" id="active{{i}}" (change)="onChange(category,$event.target.checked)" [checked]="category.active === true">
                          <label class="custom-control-label" for="active{{i}}"></label>
                        </div>
                        <button class="btn btn-sm btn-rounded btn-outline-success" type="button" tooltip="Edit" (click)="edit(category)" placement="top" ><i class="fa fa-edit pl-2"></i></button>
                      </div>
                      <div *ngIf="category.active === false" class="row">
                        <div class="custom-control custom-switch" tooltip="Inactive"  placement="top">
                          <input type="checkbox" class="custom-control-input" id="active{{i}}" (change)="onChange(category,$event.target.checked)" [checked]="category.active === true">
                          <label class="custom-control-label" for="active{{i}}"></label>
                        </div>
                        <button class="btn btn-sm btn-rounded btn-outline-success" type="button" tooltip="Edit" (click)="edit(category)" placement="top" ><i class="fa fa-edit pl-2"></i></button>
                      </div>
                    </td>
                  </tr>
                  <tr *ngIf="page.content?.length === 0">
                    <td>-</td><td>No Records</td><td>-</td>
                  </tr>
                </tbody>
                <tbody *ngIf="config.flag === 1">
                  <tr *ngFor="let tag of page.content; let i = index" >
                    <!-- <td>{{tag.tags?.name}}</td> -->
                    <td>{{tag.tagValue}}</td>
                    <td>
                      <div *ngIf="tag.active === true" class="row">
                        <div class="custom-control custom-switch" tooltip="Active"  placement="top">
                          <input type="checkbox" class="custom-control-input" id="active{{i}}" (change)="onChange(tag,$event.target.checked)" [checked]="tag.active === true">
                          <label class="custom-control-label" for="active{{i}}"></label>
                        </div>
                        <button class="btn btn-sm btn-rounded btn-outline-success" type="button" tooltip="Edit" (click)="edit(tag)" placement="top" ><i class="fa fa-edit pl-2"></i></button>
                      </div>
                      <div *ngIf="tag.active === false" class="row">
                        <div class="custom-control custom-switch" tooltip="Inactive"  placement="top">
                          <input type="checkbox" class="custom-control-input" id="active{{i}}" (change)="onChange(tag,$event.target.checked)" [checked]="tag.active === true">
                          <label class="custom-control-label" for="active{{i}}"></label>
                        </div>
                        <button class="btn btn-sm btn-rounded btn-outline-success" type="button" tooltip="Edit" (click)="edit(tag)" placement="top" ><i class="fa fa-edit pl-2"></i></button>
                      </div>
                    </td>
                  </tr>
                  <tr *ngIf="page.content?.length === 0">
                    <td>-</td><td>No Records</td> <td>-</td>
                  </tr>
                </tbody>
              </table>
              <ngx-loading [show]="loading"
                [config]="{animationType: ngxLoadingAnimationTypes.circle, primaryColour: '#ffffff', secondaryColour: '#ccc', backdropBorderRadius: '3px'}"
                ></ngx-loading>
            </div>
            <hr>
            <app-pagination *ngIf="page.content?.length > 0" [page]="page" (nextPageEvent)="getNextPage()" (previousPageEvent)="getPreviousPage()" (pageSizeEvent)="getPageInNewSize($event)"></app-pagination>
        </div>
        </div>
    </div>
</div>

<div class="modal input-container" id="dropdownModal" tabindex="-1" role="dialog" data-backdrop="static" data-keyboard="false">
    <div class="modal-dialog" role="document">
      <div class="modal-content" style="height: 300px; width: 700px;">
        <div class="modal-header">
          <h5 *ngIf="config.createorUpdateFlag === 0"  class="modal-title">Create {{config.name}}</h5>
          <h5 *ngIf="config.createorUpdateFlag === 1"  class="modal-title">Edit {{config.name}}</h5>
          <button style="font-size: 35px;" type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="row">
            <div class="col-12 col-sm-12 ">
                <!-- <p style="margin-bottom: 2px; color: #6C757D; font-size: 13px;" *ngIf="config.createorUpdateFlag === 1">Edit {{config.name}}</p>
                <p style="margin-bottom: 2px; color: #6C757D; font-size: 13px;" *ngIf="config.createorUpdateFlag === 0">Create {{config.name}}</p> -->
                <input  type="text" class="form-control" [(ngModel)]="subValue" placeholder="Enter the {{config.name}}">
                <!-- <label for="floatingInputValue">Edit {{config.name}}</label> -->
            </div>
          </div>
            <!-- <div class="col-6 col-sm-6">
                <select class="form-control" [(ngModel)]="selectedLevel" name="selectedLevel" style="color:gray" *ngIf="config.flag === 0">
                   <option hidden [value]=""  selected>Select one category </option>
                   <option *ngFor="let item of dropDownList" [ngValue]="item.id" [selected]="item.id===selectedLevel">{{item.categoryName}}</option>
                </select>
                <select class="form-control" [(ngModel)]="selectedLevel" style="color:gray" *ngIf="config.flag === 1">
                    <option hidden [value]=""  selected>Select one Tag-value </option>
                    <option *ngFor="let item of dropDownList" [ngValue]="item.id" [selected]="item.id===selectedLevel">{{item.name}}</option>
                 </select>
            </div> -->

            <div class="row">
              <div class="col-6 col-sm-6">
              <div  *ngIf="error">
               <span class="error-message">{{config.name}} is a required field</span>
              </div>
            </div>
            <!-- <div class="col-6 col-sm-6">
            <div  *ngIf="dropdownerror">
              <span class="error-message">Select is a required field</span>
            </div>
          </div> -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-dark" data-dismiss="modal">Cancel</button>
          <!-- <button type="button" class="btn btn-success" id="save" *ngIf="config.createorUpdateFlag === 0" (click)="saveValue(subValue,selectedLevel)">Save</button> -->
          <button type="button" class="btn btn-success" id="save" *ngIf="config.createorUpdateFlag === 0" (click)="saveValue(subValue)">Save</button>
          <button type="button" class="btn btn-success"   *ngIf="config.createorUpdateFlag === 1" (click)="updateValue(config.object,subValue,selectedLevel)">Update</button>
        </div>
      </div>
    </div>
  </div>
